###############################################################################
# student-vm: chạy MySQL — bị bruteforce, thí sinh đọc MySQL error log tìm flag
###############################################################################
- hosts: student-vm
  become: yes
  vars_files:
    - vars.yml

  tasks:
    - name: Install required packages
      apt:
        name:
          - default-mysql-server
          - rsyslog
          - openssh-server
        update_cache: yes

    - name: Ensure services are started
      systemd:
        name: "{{ item }}"
        enabled: yes
        state: started
      loop:
        - mysql
        - rsyslog
        - ssh

    - name: Allow password authentication for SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'
      notify: Restart ssh

    # Bật MySQL error log và general log để ghi lại failed auth
    - name: Configure MariaDB logging and bind address
      copy:
        dest: /etc/mysql/mariadb.conf.d/logging.cnf
        content: |
          [mysqld]
          log_error = /var/log/mysql/error.log
          log_warnings = 9
          plugin_load_add = server_audit
          server_audit_logging = ON
          server_audit_file_path = /var/log/mysql/audit.log
          server_audit_events = CONNECT
          server_audit_excl_users = root
        mode: "0644"
      notify: Restart mysql

    - name: Allow MariaDB to bind on all interfaces
      lineinfile:
        path: /etc/mysql/mariadb.conf.d/50-server.cnf
        regexp: '^bind-address\s*='
        line: 'bind-address = 0.0.0.0'
      notify: Restart mysql

    - name: Ensure MySQL log directory exists
      file:
        path: /var/log/mysql
        state: directory
        owner: mysql
        group: mysql
        mode: "0750"

    - name: Create lab user
      user:
        name: "{{ lab_user }}"
        shell: /bin/bash
        create_home: yes
        password: "{{ lab_password | password_hash('sha512') }}"

    - name: Add lab user to mysql group (read audit.log)
      user:
        name: "{{ lab_user }}"
        groups: mysql
        append: yes

    # Tạo MySQL user cho phép remote connect — bruteforce sẽ thử sai password
    # và MariaDB sẽ log Access denied vào error.log
    - name: Create remote MySQL user for bruteforce target
      shell: |
        mysql -u root -S /run/mysqld/mysqld.sock -e \
          "CREATE USER IF NOT EXISTS 'dbuser'@'%' IDENTIFIED BY 'Xk9#mP2qL7nR'; FLUSH PRIVILEGES;"

    # logwriter user: SSH vào để inject flag vào MySQL error log
    - name: Create logwriter user
      user:
        name: "logwriter"
        shell: /bin/bash
        create_home: yes

    - name: Create .ssh directory for logwriter
      file:
        path: /home/logwriter/.ssh
        state: directory
        owner: logwriter
        group: logwriter
        mode: "0700"

    - name: Initialize authorized_keys for logwriter
      copy:
        dest: /home/logwriter/.ssh/authorized_keys
        content: ""
        owner: logwriter
        group: logwriter
        mode: "0600"

    - name: Allow logwriter to write MySQL audit log via sudo
      copy:
        dest: /etc/sudoers.d/logwriter
        content: |
          logwriter ALL=(ALL) NOPASSWD: /usr/bin/tee
          logwriter ALL=(ALL) NOPASSWD: /usr/bin/sed
        mode: "0440"

  handlers:
    - name: Restart ssh
      systemd:
        name: ssh
        state: restarted

    - name: Restart mysql
      systemd:
        name: mysql
        state: restarted

###############################################################################
# attacker-vm: bruteforce MySQL + inject flag vào MySQL error log
###############################################################################
- hosts: attacker-vm
  become: yes
  vars_files:
    - vars.yml

  tasks:
    - name: Install required packages
      apt:
        name:
          - python3
          - python3-pymysql
          - default-mysql-client
          - openssh-client
          - cron
        update_cache: yes

    - name: Ensure cron is started
      systemd:
        name: cron
        enabled: yes
        state: started

    - name: Generate SSH keypair for attacker
      openssh_keypair:
        path: /root/.ssh/attacker_id_ed25519
        type: ed25519
        force: no

    - name: Read attacker public key
      slurp:
        src: /root/.ssh/attacker_id_ed25519.pub
      register: attacker_pubkey

    - name: Authorize attacker key on student-vm logwriter user
      delegate_to: student-vm
      authorized_key:
        user: logwriter
        key: "{{ attacker_pubkey.content | b64decode | trim }}"
        state: present

    # -------------------------------------------------------------------------
    # DYNAMIC FLAG MODE
    # -------------------------------------------------------------------------
    - name: Deploy dynamic flag injector script
      when: enable_dynamic_flag
      copy:
        dest: /usr/local/bin/inject_flag.py
        mode: "0700"
        owner: root
        group: root
        content: |
          #!/usr/bin/env python3
          import hmac, hashlib, time, subprocess

          SECRET = "{{ dynamic_flag_secret }}"
          INTERVAL = {{ dynamic_flag_interval_minutes }}
          TARGET = "{{ target_ip }}"
          ATTACKER = "{{ attacker_ip }}"
          LOG_USER = "{{ target_log_user }}"
          SSH_KEY = "/root/.ssh/attacker_id_ed25519"
          {% raw %}
          def generate_flag():
              slot = int(time.time()) // (INTERVAL * 60)
              digest = hmac.new(
                  SECRET.encode(), str(slot).encode(), hashlib.sha256
              ).hexdigest()[:16]
              return "FLAG{" + digest + "}"

          def inject(flag):
              ts = time.strftime("%Y-%m-%d %H:%M:%S")
              # Format giống hệt dòng Access denied thật trong error.log
              line = (
                  f"{ts} 0 [Warning] Access denied for user "
                  f"'{flag}'@'{ATTACKER}' (using password: YES)"
              )
              # Bước 1: xóa flag cũ
              subprocess.run([
                  "ssh", "-i", SSH_KEY,
                  "-o", "StrictHostKeyChecking=no",
                  "-o", "BatchMode=yes",
                  f"{LOG_USER}@{TARGET}",
                  "sudo sed -i \"/FLAG{/d\" /var/log/mysql/error.log",
              ], check=True)
              # Bước 2: ghi flag mới qua stdin
              subprocess.run([
                  "ssh", "-i", SSH_KEY,
                  "-o", "StrictHostKeyChecking=no",
                  "-o", "BatchMode=yes",
                  f"{LOG_USER}@{TARGET}",
                  "sudo tee -a /var/log/mysql/error.log > /dev/null",
              ], input=line.encode() + b"\n", check=True)

          if __name__ == "__main__":
              inject(generate_flag())
          {% endraw %}

    - name: Run initial dynamic flag injection
      when: enable_dynamic_flag
      command: python3 /usr/local/bin/inject_flag.py

    - name: Schedule dynamic flag injection every minute
      when: enable_dynamic_flag
      cron:
        name: "Inject dynamic flag into student-vm mysql error.log"
        minute: "*"
        job: "python3 /usr/local/bin/inject_flag.py"

    # -------------------------------------------------------------------------
    # STATIC FLAG MODE
    # -------------------------------------------------------------------------
    - name: Inject static flag into student-vm mysql error.log (once)
      when: not enable_dynamic_flag
      delegate_to: student-vm
      become: yes
      shell: |
        sed -i '/FLAG{/d' /var/log/mysql/error.log
        ts=$(date +"%Y-%m-%d %H:%M:%S")
        echo "${ts} 0 [Warning] Access denied for user '{{ static_flag }}'@'{{ target_ip }}' (using password: YES)" \
          >> /var/log/mysql/error.log

    - name: Remove dynamic flag cron if switching to static
      when: not enable_dynamic_flag
      cron:
        name: "Inject dynamic flag into student-vm mysql error.log"
        state: absent

    # -------------------------------------------------------------------------
    # BRUTEFORCE NOISE — thử login MySQL thật với username/password sai
    # -------------------------------------------------------------------------
    - name: Deploy MySQL bruteforce script
      copy:
        dest: /usr/local/bin/bruteforce.py
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          import time, random, subprocess

          TARGET = "{{ target_ip }}"
          PORT = {{ target_mysql_port }}
          {% raw %}
          USERNAMES = [
              "dbuser",
          ]

          PASSWORDS = [
              "password", "123456", "admin", "root", "toor",
              "letmein", "qwerty", "abc123", "pass", "secret",
              "mysql", "db2025", "P@ssw0rd", "changeme", "welcome1",
          ]

          def attempt(user, password):
              # mysql client thật — MariaDB audit plugin tự ghi FAILED_CONNECT
              subprocess.run([
                  "mysql",
                  f"-h{TARGET}",
                  f"-P{PORT}",
                  f"-u{user}",
                  f"-p{password}",
                  "--connect-timeout=3",
                  "-e", "SELECT 1",
              ], capture_output=True)

          if __name__ == "__main__":
              print(f"[*] Bruteforcing MySQL at {TARGET}:{PORT}")
              while True:
                  attempt(random.choice(USERNAMES), random.choice(PASSWORDS))
                  time.sleep(random.uniform(0.3, 1.0))
          {% endraw %}

    - name: Create bruteforce systemd service
      copy:
        dest: /etc/systemd/system/bruteforce.service
        content: |
          [Unit]
          Description=MySQL Bruteforce Simulator
          After=network.target

          [Service]
          ExecStart=/usr/bin/python3 /usr/local/bin/bruteforce.py
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start bruteforce service
      systemd:
        name: bruteforce
        daemon_reload: yes
        enabled: yes
        state: started

    - name: Check bruteforce service status
      command: systemctl status bruteforce
      register: bruteforce_status
      ignore_errors: yes

    - name: Show bruteforce service logs
      command: journalctl -u bruteforce -n 20 --no-pager
      register: bruteforce_logs
      ignore_errors: yes

    - name: Print bruteforce status
      debug:
        msg: "{{ bruteforce_status.stdout }}"

    - name: Print bruteforce logs
      debug:
        msg: "{{ bruteforce_logs.stdout }}"

    - name: Test MySQL connection from attacker-vm
      shell: mysql -h{{ target_ip }} -P{{ target_mysql_port }} -udbuser -pwrongpass --connect-timeout=3 -e "SELECT 1" 2>&1 || true
      register: mysql_test

    - name: Print MySQL test result
      debug:
        msg: "{{ mysql_test.stdout }}"
