###############################################################################
# student-vm: chạy MySQL — bị bruteforce, thí sinh đọc MySQL error log tìm flag
###############################################################################
- hosts: student-vm
  become: yes
  vars_files:
    - vars.yml

  tasks:
    - name: Install required packages
      apt:
        name:
          - mysql-server
          - rsyslog
          - openssh-server
        update_cache: yes

    - name: Ensure services are started
      systemd:
        name: "{{ item }}"
        enabled: yes
        state: started
      loop:
        - mysql
        - rsyslog
        - ssh

    - name: Allow password authentication for SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication yes'
      notify: Restart ssh

    # Bật MySQL error log và general log để ghi lại failed auth
    - name: Configure MySQL logging
      copy:
        dest: /etc/mysql/mysql.conf.d/logging.cnf
        content: |
          [mysqld]
          # Log failed authentication attempts
          log_error = /var/log/mysql/error.log
          log_error_verbosity = 3
          # Bind to all interfaces so attacker-vm can connect
          bind-address = 0.0.0.0
        mode: "0644"
      notify: Restart mysql

    - name: Ensure MySQL log directory exists
      file:
        path: /var/log/mysql
        state: directory
        owner: mysql
        group: mysql
        mode: "0750"

    - name: Create lab user
      user:
        name: "{{ lab_user }}"
        shell: /bin/bash
        create_home: yes
        password: "{{ lab_password | password_hash('sha512') }}"

    - name: Add lab user to mysql group (read error.log)
      user:
        name: "{{ lab_user }}"
        groups: mysql
        append: yes

    # logwriter user: SSH vào để inject flag vào MySQL error log
    - name: Create logwriter user
      user:
        name: "logwriter"
        shell: /usr/sbin/nologin
        create_home: yes

    - name: Create .ssh directory for logwriter
      file:
        path: /home/logwriter/.ssh
        state: directory
        owner: logwriter
        group: logwriter
        mode: "0700"

    - name: Initialize authorized_keys for logwriter
      copy:
        dest: /home/logwriter/.ssh/authorized_keys
        content: ""
        owner: logwriter
        group: logwriter
        mode: "0600"

    - name: Allow logwriter to write MySQL error log via sudo
      copy:
        dest: /etc/sudoers.d/logwriter
        content: |
          logwriter ALL=(ALL) NOPASSWD: /usr/bin/tee -a /var/log/mysql/error.log
          logwriter ALL=(ALL) NOPASSWD: /bin/sed -i /var/log/mysql/error.log
        mode: "0440"

  handlers:
    - name: Restart ssh
      systemd:
        name: ssh
        state: restarted

    - name: Restart mysql
      systemd:
        name: mysql
        state: restarted

###############################################################################
# attacker-vm: bruteforce MySQL + inject flag vào MySQL error log
###############################################################################
- hosts: attacker-vm
  become: yes
  vars_files:
    - vars.yml

  tasks:
    - name: Install required packages
      apt:
        name:
          - python3
          - python3-pymysql
          - default-mysql-client
          - openssh-client
          - cron
        update_cache: yes

    - name: Ensure cron is started
      systemd:
        name: cron
        enabled: yes
        state: started

    - name: Generate SSH keypair for attacker
      openssh_keypair:
        path: /root/.ssh/attacker_id_ed25519
        type: ed25519
        force: no

    - name: Read attacker public key
      slurp:
        src: /root/.ssh/attacker_id_ed25519.pub
      register: attacker_pubkey

    - name: Authorize attacker key on student-vm logwriter user
      delegate_to: student-vm
      authorized_key:
        user: logwriter
        key: "{{ attacker_pubkey.content | b64decode | trim }}"
        state: present

    # -------------------------------------------------------------------------
    # DYNAMIC FLAG MODE
    # -------------------------------------------------------------------------
    - name: Deploy dynamic flag injector script
      when: enable_dynamic_flag
      copy:
        dest: /usr/local/bin/inject_flag.py
        mode: "0700"
        owner: root
        group: root
        content: |
          #!/usr/bin/env python3
          """
          Runs on attacker-vm.
          Computes current dynamic flag then SSHes into student-vm and
          appends it to /var/log/mysql/error.log disguised as a MySQL
          Access denied entry.
          """
          import hmac, hashlib, time, subprocess

          SECRET = "{{ dynamic_flag_secret }}"
          INTERVAL = {{ dynamic_flag_interval_minutes }}
          TARGET = "{{ target_ip }}"
          LOG_USER = "{{ target_log_user }}"
          SSH_KEY = "/root/.ssh/attacker_id_ed25519"

          def generate_flag():
              slot = int(time.time()) // (INTERVAL * 60)
              digest = hmac.new(
                  SECRET.encode(), str(slot).encode(), hashlib.sha256
              ).hexdigest()[:16]
              return "FLAG{" + digest + "}"

          def inject(flag):
              ts = time.strftime("%Y-%m-%dT%H:%M:%S.000000Z")
              # Trông giống MySQL Access denied log entry thật
              line = (
                  f"{ts} 0 [Note] [MY-010926] [Server] "
                  f"Access denied for user '{flag}'@'{{ target_ip }}' "
                  f"(using password: YES)"
              )
              remote_cmd = (
                  f"sudo sed -i '/FLAG{{/d' /var/log/mysql/error.log && "
                  f"echo '{line}' | sudo tee -a /var/log/mysql/error.log > /dev/null"
              )
              subprocess.run([
                  "ssh", "-i", SSH_KEY,
                  "-o", "StrictHostKeyChecking=no",
                  "-o", "BatchMode=yes",
                  f"{LOG_USER}@{TARGET}",
                  remote_cmd,
              ], check=True)

          if __name__ == "__main__":
              inject(generate_flag())

    - name: Run initial dynamic flag injection
      when: enable_dynamic_flag
      command: python3 /usr/local/bin/inject_flag.py

    - name: Schedule dynamic flag injection every minute
      when: enable_dynamic_flag
      cron:
        name: "Inject dynamic flag into student-vm mysql error.log"
        minute: "*"
        job: "python3 /usr/local/bin/inject_flag.py"

    # -------------------------------------------------------------------------
    # STATIC FLAG MODE
    # -------------------------------------------------------------------------
    - name: Inject static flag into student-vm mysql error.log (once)
      when: not enable_dynamic_flag
      delegate_to: student-vm
      become: yes
      shell: |
        ts=$(date -u +"%Y-%m-%dT%H:%M:%S.000000Z")
        sed -i '/FLAG{/d' /var/log/mysql/error.log
        echo "${ts} 0 [Note] [MY-010926] [Server] Access denied for user '{{ static_flag }}'@'{{ target_ip }}' (using password: YES)" \
          >> /var/log/mysql/error.log

    - name: Remove dynamic flag cron if switching to static
      when: not enable_dynamic_flag
      cron:
        name: "Inject dynamic flag into student-vm mysql error.log"
        state: absent

    # -------------------------------------------------------------------------
    # BRUTEFORCE NOISE — thử login MySQL thật với username/password sai
    # -------------------------------------------------------------------------
    - name: Deploy MySQL bruteforce script
      copy:
        dest: /usr/local/bin/bruteforce.py
        mode: "0755"
        content: |
          #!/usr/bin/env python3
          """
          Continuously attempts MySQL logins with random credentials.
          Each failed attempt generates a real 'Access denied' entry
          in student-vm's /var/log/mysql/error.log.
          """
          import time, random, subprocess

          TARGET = "{{ target_ip }}"
          PORT = {{ target_mysql_port }}

          USERNAMES = [
              "admin", "root", "dbadmin", "mysql", "test", "guest",
              "backup", "deploy", "app", "webapp", "api", "monitor",
          ]

          PASSWORDS = [
              "password", "123456", "admin", "root", "toor",
              "letmein", "qwerty", "abc123", "pass", "secret",
          ]

          def attempt(user, password):
              # mysql client trả về exit code != 0 khi sai credentials
              # sshd trên target log lại failed attempt thật
              subprocess.run([
                  "mysql",
                  f"-h{TARGET}",
                  f"-P{PORT}",
                  f"-u{user}",
                  f"-p{password}",
                  "--connect-timeout=3",
                  "-e", "SELECT 1",
              ], capture_output=True)

          if __name__ == "__main__":
              print(f"[*] Bruteforcing MySQL at {TARGET}:{PORT}")
              while True:
                  attempt(random.choice(USERNAMES), random.choice(PASSWORDS))
                  time.sleep(random.uniform(0.5, 1.5))

    - name: Create bruteforce systemd service
      copy:
        dest: /etc/systemd/system/bruteforce.service
        content: |
          [Unit]
          Description=MySQL Bruteforce Simulator
          After=network.target

          [Service]
          ExecStart=/usr/bin/python3 /usr/local/bin/bruteforce.py
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target

    - name: Enable and start bruteforce service
      systemd:
        name: bruteforce
        daemon_reload: yes
        enabled: yes
        state: started
